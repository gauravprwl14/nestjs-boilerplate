receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 1s
    send_batch_size: 512
    send_batch_max_size: 1024

  memory_limiter:
    check_interval: 1s
    limit_mib: 256
    spike_limit_mib: 64

exporters:
  # Traces → Tempo
  otlp/tempo:
    endpoint: ${env:TEMPO_OTLP_GRPC_ENDPOINT}
    tls:
      insecure: true

  # Metrics → Prometheus via remote-write (push). Prometheus must be started
  # with --web.enable-remote-write-receiver (set in docker-compose.yml).
  prometheusremotewrite:
    endpoint: ${env:PROMETHEUS_REMOTE_WRITE_URL}
    tls:
      insecure: true
    resource_to_telemetry_conversion:
      enabled: true
    external_labels:
      source: otel-collector

  # Logs → Loki
  otlphttp/loki:
    endpoint: ${env:LOKI_OTLP_ENDPOINT}
    tls:
      insecure: true

  # Debug exporter — prints to stdout (useful for local development)
  debug:
    verbosity: detailed

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [otlp/tempo, debug]

    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [prometheusremotewrite, debug]

    logs:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [otlphttp/loki, debug]

  telemetry:
    logs:
      level: info

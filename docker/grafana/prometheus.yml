global:
  scrape_interval: 15s
  evaluation_interval: 15s

# Enable remote write receiver (used by Tempo metrics generator)
# Note: requires --web.enable-remote-write-receiver flag (set in docker-compose)

scrape_configs:
  # Self-scrape — Prometheus's own metrics only.
  # App metrics arrive via remote-write from the OTel Collector (push flow),
  # not via scrape. See docker/grafana/otel-collector-config.yml (prometheusremotewrite exporter).
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: development
    command:
      - sh
      - -c
      - |
        npx prisma migrate deploy --schema=src/database/prisma/schema.prisma && \
        npm run prisma:seed && \
        npm run start:dev
    environment:
      # Single source of truth for port — root .env wins over .env.development
      # in compose mode, keeping the port mapping and the app's listen port in sync.
      APP_PORT: ${APP_PORT:-3000}
    ports:
      - '${APP_PORT:-3000}:${APP_PORT:-3000}'
    volumes:
      - .:/app
      - /app/node_modules
    env_file:
      - .env.development
    depends_on:
      postgres:
        condition: service_healthy
      # redis:
      #   condition: service_healthy
      otel-collector:
        condition: service_started
    networks:
      - app-network

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-enterprise_twitter_dev}
    ports:
      - '5433:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-postgres}']
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  # redis:
  #   image: redis:7-alpine
  #   ports:
  #     - '6379:6379'
  #   volumes:
  #     - redis-data:/data
  #   healthcheck:
  #     test: ['CMD', 'redis-cli', 'ping']
  #     interval: 5s
  #     timeout: 5s
  #     retries: 5
  #   networks:
  #     - app-network

  # ─── Observability stack ────────────────────────────────────────────────────

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.103.0
    command: ['--config=/etc/otel-collector-config.yml']
    environment:
      # Consumed by otel-collector-config.yml via ${env:VAR} expansion
      TEMPO_OTLP_GRPC_ENDPOINT: ${TEMPO_OTLP_GRPC_ENDPOINT:-tempo:4317}
      LOKI_OTLP_ENDPOINT: ${LOKI_OTLP_ENDPOINT:-http://loki:3100/otlp}
      PROMETHEUS_REMOTE_WRITE_URL: ${PROMETHEUS_REMOTE_WRITE_URL:-http://prometheus:9090/api/v1/write}
    volumes:
      - ./docker/grafana/otel-collector-config.yml:/etc/otel-collector-config.yml:ro
    ports:
      - '4317:4317'   # OTLP gRPC
      - '4318:4318'   # OTLP HTTP
    depends_on:
      - tempo
      - loki
    networks:
      - app-network
    restart: unless-stopped

  tempo:
    image: grafana/tempo:2.5.0
    command: ['-config.file=/etc/tempo.yml', '-config.expand-env=true']
    environment:
      # Consumed by tempo.yml via ${VAR} expansion (requires -config.expand-env flag)
      PROMETHEUS_REMOTE_WRITE_URL: ${PROMETHEUS_REMOTE_WRITE_URL:-http://prometheus:9090/api/v1/write}
    volumes:
      - ./docker/grafana/tempo.yml:/etc/tempo.yml:ro
      - tempo-data:/var/tempo
    ports:
      - '3200:3200'   # Tempo HTTP API
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'wget --no-verbose --tries=1 --spider http://localhost:3200/ready || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5

  loki:
    image: grafana/loki:3.1.0
    command: ['-config.file=/etc/loki/loki.yml']
    volumes:
      - ./docker/grafana/loki.yml:/etc/loki/loki.yml:ro
      - loki-data:/tmp/loki
    ports:
      - '3100:3100'   # Loki HTTP API
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'wget --no-verbose --tries=1 --spider http://localhost:3100/ready || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:v2.53.0
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-remote-write-receiver'
      - '--web.enable-lifecycle'
    volumes:
      - ./docker/grafana/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - '9090:9090'   # Prometheus HTTP API
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'wget --no-verbose --tries=1 --spider http://localhost:9090/-/healthy || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5

  grafana:
    image: grafana/grafana:12.0.0
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: 'true'
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: 'true'
      GF_FEATURE_TOGGLES_ENABLE: traceqlEditor traceToMetrics
      # Drilldown apps for Traces (Tempo) and Logs (Loki) — plugin v2.x needs
      # /react/jsx-runtime served by Grafana ≥ 11.6 (shipped in 12.0).
      GF_INSTALL_PLUGINS: grafana-exploretraces-app,grafana-lokiexplore-app
      # Consumed by provisioning/datasources/datasources.yml via $VAR expansion
      PROMETHEUS_URL: ${PROMETHEUS_URL:-http://prometheus:9090}
      TEMPO_URL: ${TEMPO_URL:-http://tempo:3200}
      LOKI_URL: ${LOKI_URL:-http://loki:3100}
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    ports:
      - '3001:3000'   # Grafana UI (mapped to 3001 to avoid conflict with NestJS app)
    depends_on:
      prometheus:
        condition: service_healthy
      tempo:
        condition: service_healthy
      loki:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'wget --no-verbose --tries=1 --spider http://localhost:3000/api/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  app-network:
    driver: bridge

volumes:
  postgres-data:
  # redis-data:
  tempo-data:
  loki-data:
  prometheus-data:
  grafana-data:
